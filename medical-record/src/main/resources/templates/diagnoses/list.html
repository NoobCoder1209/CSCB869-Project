<!DOCTYPE html>
<html lang="bg"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout}">
<head>
    <title>Диагнози</title>
</head>
<body>
<div layout:fragment="content">

    <div class="flex items-center justify-between mb-6">
        <h1 class="text-3xl font-bold text-gray-800">Диагнози</h1>
        <sec:authorize access="hasRole('ADMIN')">
            <a th:href="@{/diagnoses/new}"
               class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white font-semibold rounded-lg transition-colors">
                + Нова диагноза
            </a>
        </sec:authorize>
    </div>

    <div class="bg-white rounded-xl shadow overflow-hidden">
        <div th:if="${#lists.isEmpty(diagnoses)}" class="p-8 text-center text-gray-500">
            Няма намерени диагнози.
        </div>
        <table th:unless="${#lists.isEmpty(diagnoses)}" class="w-full text-sm">
            <thead class="bg-yellow-600 text-white">
                <tr>
                    <th class="px-4 py-3 text-left font-semibold">Код (МКБ-10)</th>
                    <th class="px-4 py-3 text-left font-semibold">Описание</th>
                    <sec:authorize access="hasRole('ADMIN')">
                        <th class="px-4 py-3 text-center font-semibold">Действия</th>
                    </sec:authorize>
                </tr>
            </thead>
            <tbody>
                <tr th:each="diagnosis, stat : ${diagnoses}"
                    th:classappend="${stat.even} ? 'bg-gray-50' : 'bg-white'"
                    class="border-b border-gray-200 hover:bg-yellow-50 transition-colors">

                    <td class="px-4 py-3 font-mono font-semibold text-yellow-700"
                        th:text="${diagnosis.code}"></td>
                    <td class="px-4 py-3 text-gray-700" th:text="${diagnosis.description}"></td>
                    <sec:authorize access="hasRole('ADMIN')">
                        <td class="px-4 py-3 text-center">
                            <div class="flex items-center justify-center space-x-2">
                                <a th:href="@{/diagnoses/{id}/edit(id=${diagnosis.id})}"
                                   class="px-3 py-1 bg-yellow-500 hover:bg-yellow-600 text-white rounded text-xs font-medium transition-colors">
                                    Редактиране
                                </a>
                                <form th:action="@{/diagnoses/{id}/delete(id=${diagnosis.id})}" method="post"
                                      onsubmit="return confirm('Сигурни ли сте, че искате да изтриете тази диагноза?')">
                                    <button type="submit"
                                            class="px-3 py-1 bg-red-600 hover:bg-red-700 text-white rounded text-xs font-medium transition-colors">
                                        Изтриване
                                    </button>
                                </form>
                            </div>
                        </td>
                    </sec:authorize>
                </tr>
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
