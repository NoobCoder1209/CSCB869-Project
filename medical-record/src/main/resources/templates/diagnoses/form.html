<!DOCTYPE html>
<html lang="bg"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="${diagnosisDto.id != null ? 'Редактиране на диагноза' : 'Нова диагноза'}">Форма диагноза</title>
</head>
<body>
<div layout:fragment="content">

    <div class="flex items-center justify-between mb-6">
        <h1 class="text-3xl font-bold text-gray-800"
            th:text="${diagnosisId != null ? 'Редактиране на диагноза' : 'Нова диагноза'}">Форма диагноза</h1>
        <a th:href="@{/diagnoses}"
           class="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold rounded-lg transition-colors">
            &larr; Назад
        </a>
    </div>

    <div class="bg-white rounded-xl shadow p-8 max-w-2xl">
        <form th:action="${diagnosisId != null ? '/diagnoses/' + diagnosisId : '/diagnoses'}"
              th:object="${diagnosisDto}"
              method="post"
              class="space-y-6">

            <!-- Код -->
            <div>
                <label for="code" class="block text-sm font-semibold text-gray-700 mb-1">
                    Код (МКБ-10) <span class="text-red-500">*</span>
                </label>
                <input type="text"
                       id="code"
                       th:field="*{code}"
                       th:classappend="${#fields.hasErrors('code')} ? 'border-red-500' : 'border-gray-300'"
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors"
                       placeholder="напр. J11.1"/>
                <p th:if="${#fields.hasErrors('code')}"
                   th:errors="*{code}"
                   class="mt-1 text-sm text-red-600"></p>
            </div>

            <!-- Описание -->
            <div>
                <label for="description" class="block text-sm font-semibold text-gray-700 mb-1">
                    Описание <span class="text-red-500">*</span>
                </label>
                <input type="text"
                       id="description"
                       th:field="*{description}"
                       th:classappend="${#fields.hasErrors('description')} ? 'border-red-500' : 'border-gray-300'"
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors"
                       placeholder="Въведете описание на диагнозата"/>
                <p th:if="${#fields.hasErrors('description')}"
                   th:errors="*{description}"
                   class="mt-1 text-sm text-red-600"></p>
            </div>

            <!-- Бутони -->
            <div class="flex items-center space-x-3 pt-2">
                <button type="submit"
                        class="px-6 py-2 bg-green-600 hover:bg-green-700 text-white font-semibold rounded-lg transition-colors">
                    Запази
                </button>
                <a th:href="@{/diagnoses}"
                   class="px-6 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold rounded-lg transition-colors">
                    Отказ
                </a>
            </div>
        </form>
    </div>

</div>
</body>
</html>
