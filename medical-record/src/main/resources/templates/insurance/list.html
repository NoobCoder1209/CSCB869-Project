<!DOCTYPE html>
<html lang="bg"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Здравноосигурителни вноски</title>
</head>
<body>
<div layout:fragment="content">
    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">Здравноосигурителни вноски</h1>

        <!-- Избор на пациент -->
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <form th:action="@{/insurance}" method="get" class="flex items-end gap-4">
                <div class="flex-1">
                    <label for="patientId" class="block text-sm font-medium text-gray-700 mb-1">Изберете пациент</label>
                    <select id="patientId" name="patientId" class="w-full rounded-md border-gray-300 shadow-sm focus:ring-blue-500 focus:border-blue-500" required>
                        <option value="">-- Изберете --</option>
                        <option th:each="p : ${patients}" th:value="${p.id}" th:text="${p.fullName + ' (' + p.egn + ')'}"
                                th:selected="${selectedPatientId != null and selectedPatientId == p.id}">
                        </option>
                    </select>
                </div>
                <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">Покажи</button>
            </form>
        </div>

        <!-- Вноски на избрания пациент -->
        <div th:if="${selectedPatient != null}" class="bg-white rounded-lg shadow">
            <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                <h2 class="text-xl font-semibold text-gray-800">
                    Вноски на <span th:text="${selectedPatient.fullName}">Пациент</span>
                </h2>
            </div>

            <!-- Форма за добавяне -->
            <div class="px-6 py-4 border-b border-gray-200 bg-gray-50">
                <form th:action="@{/insurance/add}" method="post" class="flex items-end gap-4">
                    <input type="hidden" name="patientId" th:value="${selectedPatientId}" />
                    <div>
                        <label for="month" class="block text-sm font-medium text-gray-700 mb-1">Месец (ГГГГ-ММ)</label>
                        <input type="month" id="month" name="month" class="rounded-md border-gray-300 shadow-sm focus:ring-blue-500 focus:border-blue-500" required />
                    </div>
                    <button type="submit" class="px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700">Добави вноска</button>
                </form>
            </div>

            <div class="p-6">
                <div th:if="${payments == null or #lists.isEmpty(payments)}" class="text-gray-500 text-center py-4">
                    Няма регистрирани вноски за този пациент.
                </div>
                <table th:unless="${payments == null or #lists.isEmpty(payments)}" class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                    <tr>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Месец</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Действия</th>
                    </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200">
                    <tr th:each="payment : ${payments}">
                        <td class="px-4 py-3 text-sm" th:text="${payment.paymentMonth}">2025-01</td>
                        <td class="px-4 py-3 text-sm">
                            <form th:action="@{/insurance/{id}/delete(id=${payment.id})}" method="post" class="inline">
                                <input type="hidden" name="patientId" th:value="${selectedPatientId}" />
                                <button type="submit" class="text-red-600 hover:text-red-800"
                                        onclick="return confirm('Сигурни ли сте?')">Изтрий</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
