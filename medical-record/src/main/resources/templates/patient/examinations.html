<!DOCTYPE html>
<html lang="bg"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Моите прегледи</title>
</head>
<body>
<div layout:fragment="content">

    <div class="flex items-center justify-between mb-6">
        <h1 class="text-3xl font-bold text-gray-800">Моите прегледи</h1>
        <a th:href="@{/patient}"
           class="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold rounded-lg transition-colors">
            &larr; Към портала
        </a>
    </div>

    <div class="bg-white rounded-xl shadow overflow-hidden">
        <div th:if="${examinations == null or #lists.isEmpty(examinations)}"
             class="p-8 text-center text-gray-500">
            Нямате регистрирани прегледи.
        </div>
        <div th:unless="${examinations == null or #lists.isEmpty(examinations)}"
             class="overflow-x-auto">
            <div class="px-6 py-3 bg-green-50 border-b border-green-100">
                <span class="text-sm text-green-700 font-medium">
                    Общо прегледи: <strong th:text="${#lists.size(examinations)}">0</strong>
                </span>
            </div>
            <table class="w-full text-sm">
                <thead class="bg-green-700 text-white">
                    <tr>
                        <th class="px-4 py-3 text-left font-semibold">Дата</th>
                        <th class="px-4 py-3 text-left font-semibold">Лекар</th>
                        <th class="px-4 py-3 text-left font-semibold">Диагноза</th>
                        <th class="px-4 py-3 text-left font-semibold">Лечение</th>
                        <th class="px-4 py-3 text-right font-semibold">Цена</th>
                        <th class="px-4 py-3 text-center font-semibold">НЗОК</th>
                        <th class="px-4 py-3 text-center font-semibold">Детайли</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="exam, stat : ${examinations}"
                        th:classappend="${stat.even} ? 'bg-gray-50' : 'bg-white'"
                        class="border-b border-gray-200 hover:bg-green-50 transition-colors">

                        <td class="px-4 py-3 text-gray-700 whitespace-nowrap"
                            th:text="${#temporals.format(exam.examinationDate, 'dd.MM.yyyy')}"></td>
                        <td class="px-4 py-3 text-gray-700" th:text="${exam.doctor?.fullName}"></td>
                        <td class="px-4 py-3 text-gray-600">
                            <span th:if="${exam.diagnosis != null}">
                                <span class="font-mono font-semibold text-purple-700 text-xs"
                                      th:text="${exam.diagnosis.code}"></span>
                                <span class="ml-1" th:text="${exam.diagnosis.description}"></span>
                            </span>
                        </td>
                        <td class="px-4 py-3 text-gray-600 max-w-xs truncate"
                            th:text="${exam.treatment}"></td>
                        <td class="px-4 py-3 text-right font-medium text-gray-800"
                            th:text="${exam.price + ' лв.'}"></td>
                        <td class="px-4 py-3 text-center">
                            <span th:if="${exam.paidByNhif}"
                                  class="px-2 py-1 bg-green-100 text-green-700 rounded-full text-xs">Да</span>
                            <span th:unless="${exam.paidByNhif}"
                                  class="px-2 py-1 bg-orange-100 text-orange-700 rounded-full text-xs">Не</span>
                        </td>
                        <td class="px-4 py-3 text-center">
                            <a th:href="@{/examinations/{id}(id=${exam.id})}"
                               class="px-3 py-1 bg-blue-600 hover:bg-blue-700 text-white rounded text-xs font-medium transition-colors">
                                Детайли
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
