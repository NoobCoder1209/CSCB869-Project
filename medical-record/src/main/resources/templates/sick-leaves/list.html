<!DOCTYPE html>
<html lang="bg"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout}">
<head>
    <title>Болнични листове</title>
</head>
<body>
<div layout:fragment="content">

    <div class="flex items-center justify-between mb-6">
        <h1 class="text-3xl font-bold text-gray-800">Болнични листове</h1>
    </div>

    <div class="bg-white rounded-xl shadow overflow-hidden">
        <div th:if="${#lists.isEmpty(sickLeaves)}" class="p-8 text-center text-gray-500">
            Няма намерени болнични листове.
        </div>
        <table th:unless="${#lists.isEmpty(sickLeaves)}" class="w-full text-sm">
            <thead class="bg-red-700 text-white">
                <tr>
                    <th class="px-4 py-3 text-left font-semibold">Пациент</th>
                    <th class="px-4 py-3 text-left font-semibold">Лекар</th>
                    <th class="px-4 py-3 text-left font-semibold">Начална дата</th>
                    <th class="px-4 py-3 text-center font-semibold">Брой дни</th>
                    <th class="px-4 py-3 text-center font-semibold">Действия</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="sl, stat : ${sickLeaves}"
                    th:classappend="${stat.even} ? 'bg-gray-50' : 'bg-white'"
                    class="border-b border-gray-200 hover:bg-red-50 transition-colors">

                    <td class="px-4 py-3 font-medium text-gray-800"
                        th:text="${sl.examination?.patient?.fullName}"></td>
                    <td class="px-4 py-3 text-gray-700"
                        th:text="${sl.examination?.doctor?.fullName}"></td>
                    <td class="px-4 py-3 text-gray-700"
                        th:text="${#temporals.format(sl.startDate, 'dd.MM.yyyy')}"></td>
                    <td class="px-4 py-3 text-center font-semibold text-gray-800"
                        th:text="${sl.numberOfDays}"></td>
                    <td class="px-4 py-3 text-center">
                        <div class="flex items-center justify-center space-x-2">
                            <a th:href="@{/sick-leaves/{id}/edit(id=${sl.id})}"
                               class="px-3 py-1 bg-blue-600 hover:bg-blue-700 text-white rounded text-xs font-medium transition-colors">
                                Преглед
                            </a>
                            <sec:authorize access="hasAnyRole('ADMIN', 'DOCTOR')">
                                <a th:href="@{/sick-leaves/{id}/edit(id=${sl.id})}"
                                   class="px-3 py-1 bg-yellow-500 hover:bg-yellow-600 text-white rounded text-xs font-medium transition-colors">
                                    Редактиране
                                </a>
                                <form th:action="@{/sick-leaves/{id}/delete(id=${sl.id})}" method="post"
                                      onsubmit="return confirm('Сигурни ли сте, че искате да изтриете този болничен лист?')">
                                    <button type="submit"
                                            class="px-3 py-1 bg-red-600 hover:bg-red-700 text-white rounded text-xs font-medium transition-colors">
                                        Изтриване
                                    </button>
                                </form>
                            </sec:authorize>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
