<!DOCTYPE html>
<html lang="bg"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Сървърна грешка</title>
</head>
<body>
<div layout:fragment="content">
    <div class="max-w-lg mx-auto text-center py-16">
        <h1 class="text-6xl font-bold text-gray-300 mb-4">500</h1>
        <h2 class="text-2xl font-semibold text-gray-700 mb-4">Вътрешна грешка на сървъра</h2>
        <p class="text-gray-500 mb-8" th:text="${message} ?: 'Възникна неочаквана грешка. Моля, опитайте отново.'"></p>
        <a th:href="@{/}" class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
            Към началната страница
        </a>
    </div>
</div>
</body>
</html>
