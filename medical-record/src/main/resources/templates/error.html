<!DOCTYPE html>
<html lang="bg"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Възникна грешка</title>
</head>
<body>
<div layout:fragment="content">
    <div class="flex flex-col items-center justify-center py-16">
        <div class="bg-white rounded-xl shadow-lg p-12 max-w-lg w-full text-center">
            <div class="text-6xl text-red-400 mb-4">&#9888;</div>
            <h1 class="text-3xl font-bold text-red-700 mb-4">Възникна грешка</h1>
            <p class="text-gray-600 mb-4" th:if="${errorMessage}" th:text="${errorMessage}"></p>
            <p class="text-gray-600 mb-4" th:unless="${errorMessage}">
                Нещо се обърка. Моля, опитайте отново.
            </p>
            <div th:if="${status}" class="text-gray-400 text-sm mb-6">
                Код на грешка: <span th:text="${status}"></span>
            </div>
            <a th:href="@{/}"
               class="inline-block px-6 py-3 bg-blue-700 hover:bg-blue-800 text-white font-semibold rounded-lg transition-colors">
                Към начална страница
            </a>
        </div>
    </div>
</div>
</body>
</html>
