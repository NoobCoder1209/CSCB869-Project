<!DOCTYPE html>
<html lang="bg"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout}">
<head>
    <title>Прегледи</title>
</head>
<body>
<div layout:fragment="content">

    <div class="flex items-center justify-between mb-6">
        <h1 class="text-3xl font-bold text-gray-800">Прегледи</h1>
        <sec:authorize access="hasAnyRole('ADMIN', 'DOCTOR')">
            <a th:href="@{/examinations/new}"
               class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white font-semibold rounded-lg transition-colors">
                + Нов преглед
            </a>
        </sec:authorize>
    </div>

    <div class="bg-white rounded-xl shadow overflow-hidden">
        <div th:if="${#lists.isEmpty(examinations)}" class="p-8 text-center text-gray-500">
            Няма намерени прегледи.
        </div>
        <div th:unless="${#lists.isEmpty(examinations)}" class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead class="bg-purple-700 text-white">
                    <tr>
                        <th class="px-4 py-3 text-left font-semibold">Дата</th>
                        <th class="px-4 py-3 text-left font-semibold">Лекар</th>
                        <th class="px-4 py-3 text-left font-semibold">Пациент</th>
                        <th class="px-4 py-3 text-left font-semibold">Диагноза</th>
                        <th class="px-4 py-3 text-right font-semibold">Цена</th>
                        <th class="px-4 py-3 text-center font-semibold">Платен от НЗОК</th>
                        <th class="px-4 py-3 text-center font-semibold">Действия</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="exam, stat : ${examinations}"
                        th:classappend="${stat.even} ? 'bg-gray-50' : 'bg-white'"
                        class="border-b border-gray-200 hover:bg-purple-50 transition-colors">

                        <td class="px-4 py-3 text-gray-700"
                            th:text="${#temporals.format(exam.examinationDate, 'dd.MM.yyyy')}"></td>
                        <td class="px-4 py-3 text-gray-700" th:text="${exam.doctor?.fullName}"></td>
                        <td class="px-4 py-3 text-gray-700" th:text="${exam.patient?.fullName}"></td>
                        <td class="px-4 py-3 text-gray-600">
                            <span th:text="${exam.diagnosis?.code}"></span>
                            <span class="text-gray-400 text-xs" th:if="${exam.diagnosis?.description}"
                                  th:text="' - ' + ${exam.diagnosis.description}"></span>
                        </td>
                        <td class="px-4 py-3 text-right font-medium text-gray-800"
                            th:text="${exam.price + ' лв.'}"></td>
                        <td class="px-4 py-3 text-center">
                            <span th:if="${exam.paidByNhif}"
                                  class="px-2 py-1 bg-green-100 text-green-800 rounded-full text-xs font-medium">Да</span>
                            <span th:unless="${exam.paidByNhif}"
                                  class="px-2 py-1 bg-orange-100 text-orange-700 rounded-full text-xs font-medium">Не</span>
                        </td>
                        <td class="px-4 py-3 text-center">
                            <div class="flex items-center justify-center space-x-2">
                                <a th:href="@{/examinations/{id}(id=${exam.id})}"
                                   class="px-3 py-1 bg-blue-600 hover:bg-blue-700 text-white rounded text-xs font-medium transition-colors">
                                    Преглед
                                </a>
                                <sec:authorize access="hasAnyRole('ADMIN', 'DOCTOR')">
                                    <a th:href="@{/examinations/{id}/edit(id=${exam.id})}"
                                       class="px-3 py-1 bg-yellow-500 hover:bg-yellow-600 text-white rounded text-xs font-medium transition-colors">
                                        Редактиране
                                    </a>
                                    <form th:action="@{/examinations/{id}/delete(id=${exam.id})}" method="post"
                                          onsubmit="return confirm('Сигурни ли сте, че искате да изтриете този преглед?')">
                                        <button type="submit"
                                                class="px-3 py-1 bg-red-600 hover:bg-red-700 text-white rounded text-xs font-medium transition-colors">
                                            Изтриване
                                        </button>
                                    </form>
                                </sec:authorize>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
