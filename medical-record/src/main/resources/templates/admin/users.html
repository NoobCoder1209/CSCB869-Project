<!DOCTYPE html>
<html lang="bg"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Управление на потребители</title>
</head>
<body>
<div layout:fragment="content">

    <div class="flex items-center justify-between mb-6">
        <h1 class="text-3xl font-bold text-gray-800">Управление на потребители</h1>
        <a th:href="@{/admin/users/new}"
           class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white font-semibold rounded-lg transition-colors">
            + Нов потребител
        </a>
    </div>

    <div class="bg-white rounded-xl shadow overflow-hidden">
        <div th:if="${users == null or #lists.isEmpty(users)}" class="p-8 text-center text-gray-500">
            Няма намерени потребители.
        </div>
        <table th:unless="${users == null or #lists.isEmpty(users)}" class="w-full text-sm">
            <thead class="bg-gray-700 text-white">
                <tr>
                    <th class="px-4 py-3 text-left font-semibold">Потребителско ime</th>
                    <th class="px-4 py-3 text-left font-semibold">Роля</th>
                    <th class="px-4 py-3 text-center font-semibold">Действия</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user, stat : ${users}"
                    th:classappend="${stat.even} ? 'bg-gray-50' : 'bg-white'"
                    class="border-b border-gray-200 hover:bg-gray-100 transition-colors">

                    <td class="px-4 py-3 font-medium text-gray-800" th:text="${user.username}"></td>
                    <td class="px-4 py-3">
                        <span th:switch="${user.role?.name()}">
                            <span th:case="'ROLE_ADMIN'"
                                  class="px-2 py-1 bg-red-100 text-red-800 rounded-full text-xs font-medium">Администратор</span>
                            <span th:case="'ROLE_DOCTOR'"
                                  class="px-2 py-1 bg-blue-100 text-blue-800 rounded-full text-xs font-medium">Лекар</span>
                            <span th:case="'ROLE_PATIENT'"
                                  class="px-2 py-1 bg-green-100 text-green-800 rounded-full text-xs font-medium">Пациент</span>
                            <span th:case="*"
                                  class="px-2 py-1 bg-gray-100 text-gray-600 rounded-full text-xs font-medium"
                                  th:text="${user.role}"></span>
                        </span>
                    </td>
                    <td class="px-4 py-3 text-center">
                        <div class="flex items-center justify-center space-x-2">
                            <a th:href="@{/admin/users/{id}/edit(id=${user.id})}"
                               class="px-3 py-1 bg-yellow-500 hover:bg-yellow-600 text-white rounded text-xs font-medium transition-colors">
                                Редактиране
                            </a>
                            <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post"
                                  onsubmit="return confirm('Сигурни ли сте, че искате да изтриете този потребител?')">
                                <button type="submit"
                                        class="px-3 py-1 bg-red-600 hover:bg-red-700 text-white rounded text-xs font-medium transition-colors">
                                    Изтриване
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
