<!DOCTYPE html>
<html lang="bg"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout}">
<head>
    <title>Пациенти</title>
</head>
<body>
<div layout:fragment="content">

    <div class="flex items-center justify-between mb-6">
        <h1 class="text-3xl font-bold text-gray-800">Пациенти</h1>
        <sec:authorize access="hasRole('ADMIN')">
            <a th:href="@{/patients/new}"
               class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white font-semibold rounded-lg transition-colors">
                + Нов пациент
            </a>
        </sec:authorize>
    </div>

    <div class="bg-white rounded-xl shadow overflow-hidden">
        <div th:if="${#lists.isEmpty(patients)}" class="p-8 text-center text-gray-500">
            Няма намерени пациенти.
        </div>
        <table th:unless="${#lists.isEmpty(patients)}" class="w-full text-sm">
            <thead class="bg-green-700 text-white">
                <tr>
                    <th class="px-4 py-3 text-left font-semibold">ЕГН</th>
                    <th class="px-4 py-3 text-left font-semibold">Пълно име</th>
                    <th class="px-4 py-3 text-left font-semibold">Личен лекар</th>
                    <th class="px-4 py-3 text-center font-semibold">Действия</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="patient, stat : ${patients}"
                    th:classappend="${stat.even} ? 'bg-gray-50' : 'bg-white'"
                    class="border-b border-gray-200 hover:bg-green-50 transition-colors">

                    <td class="px-4 py-3 font-mono text-gray-700" th:text="${patient.egn}"></td>
                    <td class="px-4 py-3 font-medium text-gray-800" th:text="${patient.fullName}"></td>
                    <td class="px-4 py-3 text-gray-600"
                        th:text="${patient.personalDoctor != null ? patient.personalDoctor.fullName : 'Няма'}"></td>
                    <td class="px-4 py-3 text-center">
                        <div class="flex items-center justify-center space-x-2">
                            <a th:href="@{/patients/{id}(id=${patient.id})}"
                               class="px-3 py-1 bg-blue-600 hover:bg-blue-700 text-white rounded text-xs font-medium transition-colors">
                                Преглед
                            </a>
                            <sec:authorize access="hasRole('ADMIN')">
                                <a th:href="@{/patients/{id}/edit(id=${patient.id})}"
                                   class="px-3 py-1 bg-yellow-500 hover:bg-yellow-600 text-white rounded text-xs font-medium transition-colors">
                                    Редактиране
                                </a>
                                <form th:action="@{/patients/{id}/delete(id=${patient.id})}" method="post"
                                      onsubmit="return confirm('Сигурни ли сте, че искате да изтриете този пациент?')">
                                    <button type="submit"
                                            class="px-3 py-1 bg-red-600 hover:bg-red-700 text-white rounded text-xs font-medium transition-colors">
                                        Изтриване
                                    </button>
                                </form>
                            </sec:authorize>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
