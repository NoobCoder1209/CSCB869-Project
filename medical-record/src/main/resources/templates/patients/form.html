<!DOCTYPE html>
<html lang="bg"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="${patientId != null ? 'Редактиране на пациент' : 'Нов пациент'}">Форма пациент</title>
</head>
<body>
<div layout:fragment="content">

    <div class="flex items-center justify-between mb-6">
        <h1 class="text-3xl font-bold text-gray-800"
            th:text="${patientId != null ? 'Редактиране на пациент' : 'Нов пациент'}">Форма пациент</h1>
        <a th:href="@{/patients}"
           class="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold rounded-lg transition-colors">
            &larr; Назад
        </a>
    </div>

    <div class="bg-white rounded-xl shadow p-8 max-w-2xl">
        <form th:action="${patientId != null ? '/patients/' + patientId : '/patients'}"
              th:object="${patientDto}"
              method="post"
              class="space-y-6">

            <!-- Пълно име -->
            <div>
                <label for="fullName" class="block text-sm font-semibold text-gray-700 mb-1">
                    Пълно име <span class="text-red-500">*</span>
                </label>
                <input type="text"
                       id="fullName"
                       th:field="*{fullName}"
                       th:classappend="${#fields.hasErrors('fullName')} ? 'border-red-500' : 'border-gray-300'"
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors"
                       placeholder="Въведете пълното име"/>
                <p th:if="${#fields.hasErrors('fullName')}"
                   th:errors="*{fullName}"
                   class="mt-1 text-sm text-red-600"></p>
            </div>

            <!-- ЕГН -->
            <div>
                <label for="egn" class="block text-sm font-semibold text-gray-700 mb-1">
                    ЕГН <span class="text-red-500">*</span>
                </label>
                <input type="text"
                       id="egn"
                       th:field="*{egn}"
                       th:classappend="${#fields.hasErrors('egn')} ? 'border-red-500' : 'border-gray-300'"
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors"
                       placeholder="Въведете 10-цифрено ЕГН"
                       maxlength="10"/>
                <p th:if="${#fields.hasErrors('egn')}"
                   th:errors="*{egn}"
                   class="mt-1 text-sm text-red-600"></p>
            </div>

            <!-- Личен лекар -->
            <div>
                <label for="personalDoctorId" class="block text-sm font-semibold text-gray-700 mb-1">
                    Личен лекар
                </label>
                <select id="personalDoctorId"
                        th:field="*{personalDoctorId}"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white transition-colors">
                    <option value="">-- Без личен лекар --</option>
                    <option th:each="gp : ${doctors}"
                            th:value="${gp.id}"
                            th:text="${gp.fullName + ' (' + gp.uin + ')'}"></option>
                </select>
            </div>

            <!-- Бутони -->
            <div class="flex items-center space-x-3 pt-2">
                <button type="submit"
                        class="px-6 py-2 bg-green-600 hover:bg-green-700 text-white font-semibold rounded-lg transition-colors">
                    Запази
                </button>
                <a th:href="@{/patients}"
                   class="px-6 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold rounded-lg transition-colors">
                    Отказ
                </a>
            </div>
        </form>
    </div>

</div>
</body>
</html>
