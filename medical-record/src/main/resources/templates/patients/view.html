<!DOCTYPE html>
<html lang="bg"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout}">
<head>
    <title>Информация за пациент</title>
</head>
<body>
<div layout:fragment="content">

    <div class="flex items-center justify-between mb-6">
        <h1 class="text-3xl font-bold text-gray-800">Информация за пациент</h1>
        <a th:href="@{/patients}"
           class="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold rounded-lg transition-colors">
            &larr; Назад
        </a>
    </div>

    <div class="bg-white rounded-xl shadow p-8 max-w-2xl">
        <div class="grid grid-cols-1 gap-5">

            <div class="flex border-b border-gray-100 pb-4">
                <span class="w-48 text-sm font-semibold text-gray-500 uppercase tracking-wide">Пълно ime</span>
                <span class="text-gray-800 font-medium" th:text="${patient.fullName}"></span>
            </div>

            <div class="flex border-b border-gray-100 pb-4">
                <span class="w-48 text-sm font-semibold text-gray-500 uppercase tracking-wide">ЕГН</span>
                <span class="text-gray-800 font-mono" th:text="${patient.egn}"></span>
            </div>

            <div class="flex border-b border-gray-100 pb-4">
                <span class="w-48 text-sm font-semibold text-gray-500 uppercase tracking-wide">Личен лекар</span>
                <span class="text-gray-800"
                      th:text="${patient.personalDoctor != null ? patient.personalDoctor.fullName : 'Няма'}"></span>
            </div>

            <div class="flex border-b border-gray-100 pb-4">
                <span class="w-48 text-sm font-semibold text-gray-500 uppercase tracking-wide">Здравно осигуряване</span>
                <span th:if="${insured}"
                      class="px-3 py-1 bg-green-100 text-green-800 rounded-full text-sm font-medium">Осигурен</span>
                <span th:unless="${insured}"
                      class="px-3 py-1 bg-red-100 text-red-700 rounded-full text-sm font-medium">Неосигурен</span>
            </div>

            <div class="flex border-b border-gray-100 pb-4">
                <span class="w-48 text-sm font-semibold text-gray-500 uppercase tracking-wide">Брой прегледи</span>
                <span class="text-gray-800" th:text="${patient.examinations?.size() ?: 0}"></span>
            </div>

            <div class="flex">
                <span class="w-48 text-sm font-semibold text-gray-500 uppercase tracking-wide">Потребителски акаунт</span>
                <span class="text-gray-800" th:text="${patient.user?.username ?: 'Няма свързан акаунт'}"></span>
            </div>
        </div>

        <!-- Действия -->
        <div class="mt-8 flex space-x-3">
            <sec:authorize access="hasRole('ADMIN')">
                <a th:href="@{/patients/{id}/edit(id=${patient.id})}"
                   class="px-5 py-2 bg-yellow-500 hover:bg-yellow-600 text-white font-semibold rounded-lg transition-colors">
                    Редактиране
                </a>
                <form th:action="@{/patients/{id}/delete(id=${patient.id})}" method="post"
                      onsubmit="return confirm('Сигурни ли сте, че искате да изтриете този пациент?')">
                    <button type="submit"
                            class="px-5 py-2 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-lg transition-colors">
                        Изтриване
                    </button>
                </form>
            </sec:authorize>
        </div>
    </div>

</div>
</body>
</html>
