<!DOCTYPE html>
<html lang="bg"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Най-честа диагноза</title>
</head>
<body>
<div layout:fragment="content">

    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-3xl font-bold text-gray-800">Най-честа диагноза</h1>
            <p class="text-gray-500 text-sm mt-1">Отчет 2 от 11</p>
        </div>
        <a th:href="@{/reports}"
           class="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold rounded-lg transition-colors">
            &larr; Към отчети
        </a>
    </div>

    <!-- Резултат -->
    <div th:if="${diagnosis != null}"
         class="bg-white rounded-xl shadow p-8 max-w-lg">
        <div class="text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-green-100 rounded-full mb-4">
                <span class="text-2xl text-green-700 font-bold">1</span>
            </div>
            <h2 class="text-xl font-semibold text-gray-700 mb-6">Диагноза с най-много случаи</h2>
            <div class="bg-green-50 border border-green-200 rounded-xl p-6">
                <p class="text-3xl font-bold text-green-800 font-mono mb-2"
                   th:text="${diagnosis.code}"></p>
                <p class="text-lg text-gray-700 mb-2" th:text="${diagnosis.description}"></p>
            </div>
        </div>
    </div>

    <div th:unless="${diagnosis != null}"
         class="bg-white rounded-xl shadow p-8 text-center text-gray-500">
        Няма достатъчно данни за изчисляване на отчета.
    </div>

</div>
</body>
</html>
