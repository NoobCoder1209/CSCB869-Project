<!DOCTYPE html>
<html lang="bg"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Лекар с най-много болнични</title>
</head>
<body>
<div layout:fragment="content">

    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-3xl font-bold text-gray-800">Лекар с най-много болнични</h1>
            <p class="text-gray-500 text-sm mt-1">Отчет 11 от 11</p>
        </div>
        <a th:href="@{/reports}"
           class="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold rounded-lg transition-colors">
            &larr; Към отчети
        </a>
    </div>

    <!-- Резултат: топ лекар(и) -->
    <div th:if="${doctors != null and not #lists.isEmpty(doctors)}"
         class="bg-white rounded-xl shadow p-8 max-w-lg mb-6">
        <div class="text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-amber-100 rounded-full mb-4">
                <span class="text-2xl text-amber-700">&#127942;</span>
            </div>
            <h2 class="text-xl font-semibold text-gray-700 mb-4">
                Лекар с най-много издадени болнични листове
            </h2>
            <div th:each="doc : ${doctors}"
                 class="bg-amber-50 border border-amber-200 rounded-xl p-5 mb-3">
                <p class="text-2xl font-bold text-amber-800" th:text="${doc.fullName}"></p>
                <p class="text-sm text-gray-500 mt-1" th:text="${'УИН: ' + doc.uin}"></p>
            </div>
        </div>
    </div>

    <div th:unless="${doctors != null and not #lists.isEmpty(doctors)}"
         class="bg-white rounded-xl shadow p-8 text-center text-gray-500">
        Няма достатъчно данни за изчисляване на отчета.
    </div>

</div>
</body>
</html>
