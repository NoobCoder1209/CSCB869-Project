<!DOCTYPE html>
<html lang="bg"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Месец с най-много болнични</title>
</head>
<body>
<div layout:fragment="content">

    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-3xl font-bold text-gray-800">Месец с най-много болнични</h1>
            <p class="text-gray-500 text-sm mt-1">Отчет 10 от 11</p>
        </div>
        <a th:href="@{/reports}"
           class="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold rounded-lg transition-colors">
            &larr; Към отчети
        </a>
    </div>

    <!-- Резултат -->
    <div th:if="${result != null}"
         class="bg-white rounded-xl shadow p-8 max-w-lg">
        <div class="text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-red-100 rounded-full mb-4">
                <span class="text-2xl text-red-700">&#128197;</span>
            </div>
            <h2 class="text-xl font-semibold text-gray-700 mb-6">Месец с най-много издадени болнични листове</h2>
            <div class="bg-red-50 border border-red-200 rounded-xl p-6">
                <!-- Показваме месец и година -->
                <p class="text-3xl font-bold text-red-800 mb-2">
                    <span th:text="${result.month}"></span>/<span th:text="${result.year}"></span>
                </p>
                <div class="inline-block px-4 py-2 bg-red-600 text-white rounded-full text-sm font-semibold mt-2">
                    <span th:text="${result.count}">0</span> болнични листа
                </div>
            </div>
        </div>
    </div>

    <div th:unless="${result != null}"
         class="bg-white rounded-xl shadow p-8 text-center text-gray-500">
        Няма достатъчно данни за изчисляване на отчета.
    </div>

</div>
</body>
</html>
