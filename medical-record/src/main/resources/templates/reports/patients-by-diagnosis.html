<!DOCTYPE html>
<html lang="bg"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Пациенти с определена диагноза</title>
</head>
<body>
<div layout:fragment="content">

    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-3xl font-bold text-gray-800">Пациенти с определена диагноза</h1>
            <p class="text-gray-500 text-sm mt-1">Отчет 1 от 11</p>
        </div>
        <a th:href="@{/reports}"
           class="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold rounded-lg transition-colors">
            &larr; Към отчети
        </a>
    </div>

    <!-- Форма за избор -->
    <div class="bg-white rounded-xl shadow p-6 mb-6">
        <form th:action="@{/reports/patients-by-diagnosis}" method="get" class="flex flex-col sm:flex-row gap-4 items-end">
            <div class="flex-1">
                <label for="diagnosisId" class="block text-sm font-semibold text-gray-700 mb-1">
                    Изберете диагноза
                </label>
                <select id="diagnosisId"
                        name="diagnosisId"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                    <option value="">-- Изберете диагноза --</option>
                    <option th:each="d : ${diagnoses}"
                            th:value="${d.id}"
                            th:text="${d.code + ' - ' + d.description}"
                            th:selected="${selectedDiagnosisId != null and selectedDiagnosisId == d.id}"></option>
                </select>
            </div>
            <button type="submit"
                    class="px-6 py-2 bg-blue-700 hover:bg-blue-800 text-white font-semibold rounded-lg transition-colors whitespace-nowrap">
                Покажи
            </button>
        </form>
    </div>

    <!-- Резултати -->
    <div class="bg-white rounded-xl shadow overflow-hidden" th:if="${patients != null}">
        <div th:if="${#lists.isEmpty(patients)}" class="p-8 text-center text-gray-500">
            Няма намерени пациенти за избраната диагноза.
        </div>
        <div th:unless="${#lists.isEmpty(patients)}">
            <div class="px-6 py-3 bg-blue-50 border-b border-blue-100">
                <span class="text-sm text-blue-700 font-medium">
                    Намерени резултати: <strong th:text="${#lists.size(patients)}">0</strong>
                </span>
            </div>
            <table class="w-full text-sm">
                <thead class="bg-blue-700 text-white">
                    <tr>
                        <th class="px-4 py-3 text-left font-semibold">Пълно име</th>
                        <th class="px-4 py-3 text-left font-semibold">ЕГН</th>
                        <th class="px-4 py-3 text-left font-semibold">Личен лекар</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="patient, stat : ${patients}"
                        th:classappend="${stat.even} ? 'bg-gray-50' : 'bg-white'"
                        class="border-b border-gray-200">
                        <td class="px-4 py-3 font-medium text-gray-800" th:text="${patient.fullName}"></td>
                        <td class="px-4 py-3 font-mono text-gray-600" th:text="${patient.egn}"></td>
                        <td class="px-4 py-3 text-gray-600"
                            th:text="${patient.personalDoctor != null ? patient.personalDoctor.fullName : 'Няма'}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
