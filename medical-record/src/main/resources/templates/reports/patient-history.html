<!DOCTYPE html>
<html lang="bg"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>История на пациент</title>
</head>
<body>
<div layout:fragment="content">

    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-3xl font-bold text-gray-800">История на пациент</h1>
            <p class="text-gray-500 text-sm mt-1">Отчет 8 от 11</p>
        </div>
        <a th:href="@{/reports}"
           class="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold rounded-lg transition-colors">
            &larr; Към отчети
        </a>
    </div>

    <!-- Форма за избор -->
    <div class="bg-white rounded-xl shadow p-6 mb-6">
        <!-- Controller passes: patients, examinations, selectedPatientId -->
        <form th:action="@{/reports/patient-history}" method="get" class="flex flex-col sm:flex-row gap-4 items-end">
            <div class="flex-1">
                <label for="patientId" class="block text-sm font-semibold text-gray-700 mb-1">
                    Изберете пациент
                </label>
                <select id="patientId"
                        name="patientId"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                    <option value="">-- Изберете пациент --</option>
                    <option th:each="p : ${patients}"
                            th:value="${p.id}"
                            th:text="${p.fullName + ' (' + p.egn + ')'}"
                            th:selected="${selectedPatientId != null and selectedPatientId == p.id}"></option>
                </select>
            </div>
            <button type="submit"
                    class="px-6 py-2 bg-pink-600 hover:bg-pink-700 text-white font-semibold rounded-lg transition-colors whitespace-nowrap">
                Покажи
            </button>
        </form>
    </div>

    <!-- Резултати -->
    <div class="bg-white rounded-xl shadow overflow-hidden" th:if="${examinations != null}">
        <div th:if="${#lists.isEmpty(examinations)}" class="p-8 text-center text-gray-500">
            Избраният пациент няма регистрирани прегледи.
        </div>
        <div th:unless="${#lists.isEmpty(examinations)}">
            <div class="px-6 py-3 bg-pink-50 border-b border-pink-100">
                <span class="text-sm text-pink-700 font-medium">
                    Брой прегледи: <strong th:text="${#lists.size(examinations)}">0</strong>
                </span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-pink-700 text-white">
                        <tr>
                            <th class="px-4 py-3 text-left font-semibold">Дата</th>
                            <th class="px-4 py-3 text-left font-semibold">Лекар</th>
                            <th class="px-4 py-3 text-left font-semibold">Диагноза</th>
                            <th class="px-4 py-3 text-left font-semibold">Лечение</th>
                            <th class="px-4 py-3 text-right font-semibold">Цена</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="exam, stat : ${examinations}"
                            th:classappend="${stat.even} ? 'bg-gray-50' : 'bg-white'"
                            class="border-b border-gray-200">
                            <td class="px-4 py-3 text-gray-700 whitespace-nowrap"
                                th:text="${#temporals.format(exam.examinationDate, 'dd.MM.yyyy')}"></td>
                            <td class="px-4 py-3 text-gray-700" th:text="${exam.doctor?.fullName}"></td>
                            <td class="px-4 py-3 text-gray-600">
                                <span th:if="${exam.diagnosis != null}">
                                    <span class="font-mono font-semibold text-purple-700 text-xs"
                                          th:text="${exam.diagnosis.code}"></span>
                                    <span th:text="${' - ' + exam.diagnosis.description}"></span>
                                </span>
                            </td>
                            <td class="px-4 py-3 text-gray-600 max-w-xs truncate"
                                th:text="${exam.treatment}"></td>
                            <td class="px-4 py-3 text-right font-medium text-gray-800"
                                th:text="${exam.price + ' лв.'}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>
</body>
</html>
