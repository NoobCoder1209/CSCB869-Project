<!DOCTYPE html>
<html lang="bg"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Общо платено от пациенти</title>
</head>
<body>
<div layout:fragment="content">

    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-3xl font-bold text-gray-800">Общо платено от пациенти</h1>
            <p class="text-gray-500 text-sm mt-1">Отчет 4 от 11</p>
        </div>
        <a th:href="@{/reports}"
           class="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold rounded-lg transition-colors">
            &larr; Към отчети
        </a>
    </div>

    <!-- Резултат -->
    <div class="bg-white rounded-xl shadow p-8 max-w-lg">
        <div class="text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-orange-100 rounded-full mb-4">
                <span class="text-2xl text-orange-700">&#8364;</span>
            </div>
            <h2 class="text-xl font-semibold text-gray-700 mb-4">Сума на преглedi, платени от пациентите</h2>
            <p class="text-gray-500 text-sm mb-6">(Прегледи, за които НЗОК не е покрил разходите)</p>
            <div class="bg-orange-50 border border-orange-200 rounded-xl p-8">
                <p class="text-4xl font-bold text-orange-800">
                    <span th:text="${totalAmount != null ? totalAmount : '0.00'}">0.00</span>
                    <span class="text-2xl ml-1">лв.</span>
                </p>
            </div>
        </div>
    </div>

</div>
</body>
</html>
