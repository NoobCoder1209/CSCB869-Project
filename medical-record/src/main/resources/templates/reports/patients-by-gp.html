<!DOCTYPE html>
<html lang="bg"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Пациенти на личен лекар</title>
</head>
<body>
<div layout:fragment="content">

    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-3xl font-bold text-gray-800">Пациенти на личен лекар</h1>
            <p class="text-gray-500 text-sm mt-1">Отчет 3 от 11</p>
        </div>
        <a th:href="@{/reports}"
           class="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold rounded-lg transition-colors">
            &larr; Към отчети
        </a>
    </div>

    <!-- Форма за избор -->
    <div class="bg-white rounded-xl shadow p-6 mb-6">
        <!-- Controller passes: doctors (GPs), patients, selectedDoctorId -->
        <form th:action="@{/reports/patients-by-gp}" method="get" class="flex flex-col sm:flex-row gap-4 items-end">
            <div class="flex-1">
                <label for="doctorId" class="block text-sm font-semibold text-gray-700 mb-1">
                    Изберете личен лекар (ОПЛ)
                </label>
                <select id="doctorId"
                        name="doctorId"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                    <option value="">-- Изберете личен лекар --</option>
                    <option th:each="gp : ${doctors}"
                            th:value="${gp.id}"
                            th:text="${gp.fullName + ' (' + gp.uin + ')'}"
                            th:selected="${selectedDoctorId != null and selectedDoctorId == gp.id}"></option>
                </select>
            </div>
            <button type="submit"
                    class="px-6 py-2 bg-yellow-600 hover:bg-yellow-700 text-white font-semibold rounded-lg transition-colors whitespace-nowrap">
                Покажи
            </button>
        </form>
    </div>

    <!-- Резултати -->
    <div class="bg-white rounded-xl shadow overflow-hidden" th:if="${patients != null}">
        <div th:if="${#lists.isEmpty(patients)}" class="p-8 text-center text-gray-500">
            Избраният лекар няма регистрирани пациенти.
        </div>
        <div th:unless="${#lists.isEmpty(patients)}">
            <div class="px-6 py-3 bg-yellow-50 border-b border-yellow-100">
                <span class="text-sm text-yellow-800 font-medium">
                    Намерени пациенти: <strong th:text="${#lists.size(patients)}">0</strong>
                </span>
            </div>
            <table class="w-full text-sm">
                <thead class="bg-yellow-600 text-white">
                    <tr>
                        <th class="px-4 py-3 text-left font-semibold">Пълно ime</th>
                        <th class="px-4 py-3 text-left font-semibold">ЕГН</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="patient, stat : ${patients}"
                        th:classappend="${stat.even} ? 'bg-gray-50' : 'bg-white'"
                        class="border-b border-gray-200">
                        <td class="px-4 py-3 font-medium text-gray-800" th:text="${patient.fullName}"></td>
                        <td class="px-4 py-3 font-mono text-gray-600" th:text="${patient.egn}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
